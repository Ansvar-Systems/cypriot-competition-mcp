# sources.yml -- Data provenance metadata
# Reference: docs/mcp-infrastructure-blueprint.md
# Last verified: 2026-05-17 (MT/CY fleet hygiene Round 2)

schema_version: "1.0"
mcp_name: "Cypriot Competition MCP"
category: "domain_intelligence"
jurisdiction: "CY"

sources:
  - name: "Commission for the Protection of Competition (CPC)"
    authority: "Commission for the Protection of Competition, Republic of Cyprus"
    official_url: "https://www.competition.gov.cy"
    retrieval_method: "HTML_SCRAPE"
    format: "HTML"
    authentication: "none"
    update_frequency: "monthly"
    license:
      code: "Cyprus-PSI"
      type: "Statutory — Cyprus public-sector information re-use regime"
      url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32019L1024"
      evidence_url: "https://web.archive.org/web/2025/http://www.competition.gov.cy/competition/competition.nsf/disclaimer_en/disclaimer_en?OpenDocument"
      summary: >
        Cyprus has transposed EU Directive 2019/1024 (Open Data and re-use of
        public sector information) as Law 143(I)/2021. Article 8 of the
        directive mandates commercial re-use of public-sector documents.
        CPC is a public-sector body of the Republic of Cyprus within scope
        of Law 143(I)/2021. The CPC disclaimer page is silent on reuse but
        the Republic-of-Cyprus copyright assertion does not displace the
        statutory PSI re-use regime. Verbatim disclaimer text recovered via
        Wayback Machine 2026-05-17.
      attribution_block: "Source: Commission for the Protection of Competition (CPC), Republic of Cyprus. Reproduced under Cyprus public-sector information re-use regime (Law 143(I)/2021, transposing EU Directive 2019/1024)."
    source_url_pattern: "^https?://(www\\.)?competition\\.gov\\.cy/competition/competition\\.nsf/.*"
    source_url_pattern_granularity: "item-level"
    coverage:
      scope: >
        CPC decisions, opinions, sectoral inquiries, merger reviews, and
        guidance on Cyprus Law 13(I)/2008 on the Protection of Competition.
    languages:
      - "el"
      - "en"
